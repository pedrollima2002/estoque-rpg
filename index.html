<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Multimarcas | Estoque</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <noscript>Ative o JavaScript para acessar o controle de estoque da RPG Multimarcas.</noscript>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="loading-overlay" class="loading-overlay" hidden>
    <div class="loading-box">Carregando...</div>
  </div>

  <main>
    <section id="login-view" class="login-view">
      <div class="login-panel">
        <p class="brand-kicker">Controle de estoque</p>
        <h1>RPG Multimarcas</h1>
        <form id="login-form" class="login-form">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required>

          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" autocomplete="current-password" required>

          <button id="entrar-btn" class="primary-button" type="submit">Entrar</button>
        </form>
        <p id="config-alert" class="config-alert" hidden></p>
      </div>
    </section>

    <section id="app-view" class="app-view" hidden>
      <header class="app-header">
        <div>
          <p class="brand-kicker">RPG Multimarcas</p>
          <h1>Estoque</h1>
        </div>
        <div class="session-actions">
          <span id="usuario-email" class="user-email"></span>
          <button id="sair-btn" class="ghost-button" type="button">Sair</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Seções">
        <button class="tab-button active" type="button" data-tab="estoque">Estoque</button>
        <button class="tab-button" type="button" data-tab="historico">Histórico</button>
      </nav>

      <section id="estoque-section" class="content-section">
        <div class="top-bar">
          <div class="metrics" aria-label="Resumo do estoque">
            <div class="metric">
              <span>Total de peças</span>
              <strong id="total-pecas">0</strong>
            </div>
            <div class="metric">
              <span>Modelos cadastrados</span>
              <strong id="total-modelos">0</strong>
            </div>
          </div>
          <button id="novo-produto-btn" class="primary-button add-product-button" type="button">+ Novo produto</button>
        </div>

        <div class="filters">
          <label class="search-field" for="busca">
            <span>Pesquisar</span>
            <input id="busca" type="search" placeholder="Nome do produto" autocomplete="off">
          </label>

          <label for="filtro-categoria">
            <span>Categoria</span>
            <select id="filtro-categoria"></select>
          </label>

          <label for="filtro-cor">
            <span>Cor</span>
            <select id="filtro-cor"></select>
          </label>

          <label for="filtro-tamanho">
            <span>Tamanho</span>
            <select id="filtro-tamanho"></select>
          </label>

          <label for="filtro-estoque">
            <span>Estoque</span>
            <select id="filtro-estoque">
              <option value="todos">Todos</option>
              <option value="baixo">Estoque baixo</option>
              <option value="zerado">Sem estoque</option>
            </select>
          </label>
        </div>

        <div id="produtos-lista" class="products-list" aria-live="polite"></div>
        <p id="produtos-vazio" class="empty-state" hidden>Nenhum produto encontrado.</p>
      </section>

      <section id="historico-section" class="content-section" hidden>
        <div class="section-heading">
          <h2>Histórico</h2>
          <button id="atualizar-historico-btn" class="ghost-button" type="button">Atualizar</button>
        </div>
        <div id="historico-lista" class="history-list" aria-live="polite"></div>
        <p id="historico-vazio" class="empty-state" hidden>Nenhuma movimentação registrada.</p>
      </section>
    </section>
  </main>

  <dialog id="produto-dialog" class="modal">
    <form id="produto-form" class="modal-panel" novalidate>
      <div class="modal-header">
        <h2 id="produto-form-titulo">Novo produto</h2>
        <button id="fechar-modal-btn" class="icon-button" type="button" aria-label="Fechar">×</button>
      </div>

      <input id="produto-id" type="hidden">

      <div class="form-grid">
        <label for="produto-nome">
          <span>Nome do produto</span>
          <input id="produto-nome" type="text" required maxlength="120">
        </label>

        <label for="produto-descricao">
          <span>Descrição ou variação</span>
          <input id="produto-descricao" type="text" maxlength="160">
        </label>

        <label for="produto-subcategoria">
          <span>Subcategoria</span>
          <input id="produto-subcategoria" type="text" maxlength="80" list="sugestoes-subcategoria" autocomplete="off">
        </label>

        <label for="produto-categoria">
          <span>Categoria</span>
          <input id="produto-categoria" type="text" required maxlength="80" list="sugestoes-categoria" autocomplete="off">
        </label>

        <label for="produto-cor">
          <span>Cor</span>
          <input id="produto-cor" type="text" required maxlength="80" list="sugestoes-cor" autocomplete="off">
        </label>

        <label for="produto-tamanho">
          <span>Tamanho</span>
          <input id="produto-tamanho" type="text" maxlength="40" list="sugestoes-tamanho" autocomplete="off">
        </label>

        <datalist id="sugestoes-subcategoria"></datalist>
        <datalist id="sugestoes-categoria"></datalist>
        <datalist id="sugestoes-cor"></datalist>
        <datalist id="sugestoes-tamanho"></datalist>

        <label for="produto-quantidade">
          <span>Quantidade</span>
          <input id="produto-quantidade" type="number" min="0" step="1" required>
        </label>

        <label for="produto-valor-venda">
          <span>Valor de venda</span>
          <input id="produto-valor-venda" type="number" min="0" step="0.01" inputmode="decimal">
        </label>
      </div>

      <div class="form-actions">
        <button id="cancelar-produto-btn" class="ghost-button" type="button">Cancelar</button>
        <button id="salvar-produto-btn" class="primary-button" type="submit">Salvar</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
